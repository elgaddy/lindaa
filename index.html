<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Linda 💛</title>

<style>
body {
    margin: 0;
    font-family: 'Courier New', monospace;
    background: black;
    color: white;
    overflow: hidden;
}

.light {
    background: #f5f5f5;
    color: #111;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
}

/* contenedor */
.container {
    position: relative;
    z-index: 2;
    text-align: center;
    margin-top: 8%;
}

/* FOTO */
.foto {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 3px solid #ff4d6d;
    box-shadow: 0 0 25px #ff4d6d;
    margin-top: 15px;
    transition: transform 0.2s;
}

/* glitch */
.glitch {
    animation: glitch 1s infinite;
}

@keyframes glitch {
    0% { text-shadow: 2px 0 red; }
    50% { text-shadow: -2px 0 blue; }
    100% { text-shadow: 2px 0 red; }
}

/* botones */
button {
    padding: 12px 20px;
    background: #ff4d6d;
    border: none;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    margin: 10px;
}

button:hover {
    transform: scale(1.1);
}

/* carta */
#carta {
    width: 70%;
    margin: auto;
    margin-top: 20px;
    font-size: 18px;
}

/* corazones */
.heart {
    position: fixed;
    color: #ff4d6d;
    animation: float 5s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

/* TE QUIERO */
#finalMsg {
    position: fixed;
    top: 40%;
    width: 100%;
    text-align: center;
    font-size: 50px;
    color: #ff4d6d;
    text-shadow: 0 0 30px #ff4d6d;
    display: none;
    animation: zoom 1s infinite alternate;
}

@keyframes zoom {
    from { transform: scale(1); }
    to { transform: scale(1.3); }
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">
    <h1 class="glitch">💻 Acceso detectado...</h1>

    <img src="linda.jpg" class="foto" id="foto">

    <br>

    <button onclick="iniciar()">Iniciar 💛</button>
    <button onclick="modo()">🌗 Modo</button>

    <div id="carta"></div>

    <div id="final" style="display:none;">
        <button onclick="sorpresa()">🎁 Sorpresa</button>
        <button onclick="secreto()">🔐 Secreto</button>
    </div>
</div>

<h1 id="finalMsg">💖 TE QUIERO 💖</h1>

<script>
// 🎵 música
let audio = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3");

// modo
function modo(){
    document.body.classList.toggle("light");
}

// iniciar
function iniciar(){
    audio.play();
    hackeo();
    escribir();
    corazones();
}

// hackeo
function hackeo(){
    let c = document.getElementById("carta");
    c.innerHTML = "Iniciando acceso...<br>";
    setTimeout(()=> c.innerHTML += "▓▒░█▓▒░█▓▒░█<br>",500);
    setTimeout(()=> c.innerHTML += "Descifrando usuario...<br>",900);
    setTimeout(()=> c.innerHTML += "Acceso concedido: LINDA 💛<br><br>",1400);
}

// escribir
function escribir(){
let texto = `Oye Linda,

De verdad me cuesta empezar esta carta sin ponerme un poco sentimental,
porque no es fácil resumir en palabras todo lo que significan estos años de amistad contigo.
Gracias por cada risa, cada momento y hasta los enojos, porque todo eso hizo nuestra amistad más fuerte.

Hoy es un día demasiado especial, es tu cumpleaños 🎂
y quiero recordarte lo increíble que eres, lo mucho que vales y lo feliz que me hace tenerte en mi vida.

Gracias por existir, Linda. Eres de esas personas que marcan la vida de uno.
Espero que este nuevo año venga lleno de cosas lindas, sueños cumplidos y mucha felicidad.

Ojalá sigamos teniendo muchas salidas, explorando cafeterías,
riendo por cualquier tontera y viviendo momentos que después recordemos con una sonrisa.

Que Dios te bendiga muchísimo, te cuide y te guíe siempre.

Te quiero mucho, Linda 💛

— Gaddy 💛`;

let i=0;
let c=document.getElementById("carta");

function type(){
    if(i<texto.length){
        c.innerHTML+=texto.charAt(i);
        i++;
        setTimeout(type,25);
    } else {
        document.getElementById("final").style.display="block";
    }
}
setTimeout(type,1500);
}

// sorpresa
function sorpresa(){
    document.getElementById("finalMsg").style.display="block";
    fireworks();
}

// secreto
function secreto(){
    let pass=prompt("Contraseña 💛");
    if(pass==="linda"){
        alert("💛 Eres demasiado especial para mí...");
    } else {
        alert("❌ Incorrecto");
    }
}

// corazones
function corazones(){
    setInterval(()=>{
        let h=document.createElement("div");
        h.className="heart";
        h.innerHTML="💛";
        h.style.left=Math.random()*100+"vw";
        h.style.fontSize=(Math.random()*20+10)+"px";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),5000);
    },300);
}

// estrellas
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=Array.from({length:100},()=>({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2
}));

function drawStars(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white";
    stars.forEach(s=>{
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fill();
    });
    requestAnimationFrame(drawStars);
}
drawStars();

// fuegos artificiales
function fireworks(){
    for(let i=0;i<50;i++){
        let f=document.createElement("div");
        f.style.position="fixed";
        f.style.left=Math.random()*100+"vw";
        f.style.top=Math.random()*100+"vh";
        f.style.width="5px";
        f.style.height="5px";
        f.style.background="yellow";
        document.body.appendChild(f);
        setTimeout(()=>f.remove(),1000);
    }
}

// parallax
document.addEventListener("mousemove",e=>{
    let foto=document.getElementById("foto");
    let x=(e.clientX/window.innerWidth-0.5)*10;
    let y=(e.clientY/window.innerHeight-0.5)*10;
    foto.style.transform=`rotateY(${x}deg) rotateX(${y}deg)`;
});

// easter egg
document.body.addEventListener("click",e=>{
    if(e.clientX<50 && e.clientY<50){
        alert("💛 Sabía que encontrarías esto...");
    }
});
</script>

</body>
</html>
